{# Base styles for xhtml2pdf documents #}
<style>
  @page { size: A4; margin: 2cm 1.8cm; }
  body { font-family: Helvetica, sans-serif; font-size: 10pt; color: #111; }
  h1 { font-size: 15pt; text-align: center; margin-bottom: 4pt; }
  h2 { font-size: 12pt; }
  h3 { font-size: 11pt; margin: 10pt 0 3pt; }
  p { margin: 5pt 0; line-height: 1.35; }
  table { width: 100%; border-collapse: collapse; margin: 6pt 0; }
  td, th { padding: 3pt 5pt; font-size: 9pt; vertical-align: top; }
  table.doc-table td, table.doc-table th { border: 0.6pt solid #555; }
  .num { text-align: right; }
  .center { text-align: center; }
  .muted { color: #555; font-size: 8pt; }
  .header { text-align: center; margin-bottom: 8pt; }
</style>

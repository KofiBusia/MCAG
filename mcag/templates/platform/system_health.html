{% extends "base.html" %}
{% block content %}
<h1>System health</h1>
<div class="card">
  <table>
    <tr><td>Database</td><td>{{ db_status }}</td></tr>
    {% for k, v in counts.items() %}<tr><td>{{ k.replace('_',' ')|title }}</td><td class="num">{{ v }}</td></tr>{% endfor %}
  </table>
</div>
{% endblock %}
